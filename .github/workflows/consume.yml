name: consume

# Consume OpenINTEL Zonestream topics in parallel shards (each shard =
# independent broker fetch quota → linear speed-up). Publishes per-day
# Release assets — extracted DNS observations (Avro topics) or raw JSONL
# (JSON topics).
#
# Matrix: per-topic config in .github/shards.json (shared with retry.yml).
# Each entry has `shards` (count) and `format` (`avro_dns` → script
# consume_group.py with DNS extraction, `json` → consume_json.py raw dump).
# Sized so each topic's slowest shard finishes within a similar wall-clock
# budget and total parallel job count stays ≤ 20 (GH Free public-repo
# concurrent-job ceiling).
#
# The `plan` job emits the matrix; when invoked with a non-empty `targets`
# input (e.g. by retry.yml) it runs only that subset, enabling per-shard
# re-runs without re-doing finished work.
#
# Schedule: twice daily at 00:30 and 12:30 UTC. Each run consumes a 12h
# window anchored to the nearest preceding 12h UTC boundary, so coverage
# stays within the broker's ~24h retention with ~12h of safety margin.
# Tag format: snap-YYYY-MM-DD-HH where HH ∈ {00, 12} marks the window end.

on:
  schedule:
    - cron: '30 0,12 * * *'
  workflow_dispatch:
    inputs:
      run_seconds:
        description: 'Wall-clock budget per shard (seconds; GH max 21600)'
        required: false
        default: '18000'
      window_hours:
        description: 'Window size in hours (default 12 matches the twice-daily schedule)'
        required: false
        default: '12'
      max_msgs:
        description: 'Per-shard message cap (0 = unlimited)'
        required: false
        default: '0'
      group_suffix:
        description: 'Optional group suffix to fork from prior runs'
        required: false
        default: ''
      targets:
        description: 'Optional JSON array overriding the matrix; e.g. ''[{"topic":"newly_registered_domains_measurements","shard":3,"shard_count":11,"format":"avro_dns"}]''. Each entry needs topic/shard/shard_count/format. Empty = full matrix from .github/shards.json.'
        required: false
        default: ''
      day:
        description: 'Override the UTC date the run targets (YYYY-MM-DD). Empty = today UTC at job start.'
        required: false
        default: ''
      hour:
        description: 'Override the window-end hour (00 or 12, UTC). Empty = pick nearest preceding 12h boundary from current UTC time.'
        required: false
        default: ''

permissions:
  contents: write

# Prevent concurrent runs (scheduled cron + manual dispatch racing on the
# same Release / consumer groups). New run waits if one is in progress.
concurrency:
  group: consume
  cancel-in-progress: false

jobs:
  plan:
    # Emit the matrix for the consume job. Default: full plan from
    # .github/shards.json. When `targets` input is set, use it as-is so
    # callers (e.g. retry.yml) can run any subset of (topic, shard, shard_count).
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: set
        env:
          TARGETS: ${{ github.event.inputs.targets }}
        run: |
          set -euo pipefail
          if [ -n "$TARGETS" ]; then
            INCLUDE="$TARGETS"
          else
            INCLUDE=$(jq -c '[to_entries[] as $e | range(0; $e.value.shards) | {topic: $e.key, shard: ., shard_count: $e.value.shards, format: $e.value.format}]' .github/shards.json)
          fi
          MATRIX=$(jq -nc --argjson inc "$INCLUDE" '{include: $inc}')
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Plan ($(echo "$INCLUDE" | jq 'length') jobs):"
          echo "$INCLUDE" | jq

  consume:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          pip install --quiet fastavro confluent-kafka pyarrow

      - name: Set window
        id: window
        env:
          WINDOW_HOURS: ${{ github.event.inputs.window_hours || '12' }}
          DAY_INPUT: ${{ github.event.inputs.day }}
          HOUR_INPUT: ${{ github.event.inputs.hour }}
        run: |
          # Anchor the window end to the nearest preceding 12h UTC boundary
          # (00:00 or 12:00) so consecutive twice-daily runs tile the timeline
          # with no overlap or gap, independent of cron-fire jitter. Tag is
          # snap-DAY-HH where HH marks the window end.
          # `day` and `hour` inputs override the auto-detected values — used by
          # retry.yml so a queued retry that crosses a boundary still targets
          # the intended window.
          DAY="${DAY_INPUT:-$(date -u +%F)}"
          if [ -n "$HOUR_INPUT" ]; then
            HOUR="$HOUR_INPUT"
          else
            NOW_H=$(date -u +%H)
            if [ "$((10#$NOW_H))" -lt 12 ]; then HOUR=00; else HOUR=12; fi
          fi
          if [ "$HOUR" != "00" ] && [ "$HOUR" != "12" ]; then
            echo "hour must be 00 or 12, got $HOUR"; exit 1
          fi
          END_MS=$(($(date -u -d "${DAY}T${HOUR}:00:00Z" +%s) * 1000))
          START_MS=$((END_MS - WINDOW_HOURS * 3600 * 1000))
          echo "day=$DAY" >> $GITHUB_OUTPUT
          echo "hour=$HOUR" >> $GITHUB_OUTPUT
          echo "tag=snap-${DAY}-${HOUR}" >> $GITHUB_OUTPUT
          echo "end_ms=$END_MS" >> $GITHUB_OUTPUT
          echo "start_ms=$START_MS" >> $GITHUB_OUTPUT
          echo "Topic: ${{ matrix.topic }}  Shard: ${{ matrix.shard }}  Tag: snap-${DAY}-${HOUR}"
          echo "Window: $START_MS → $END_MS  (${WINDOW_HOURS}h, ending at ${DAY}T${HOUR}:00:00Z)"

      - name: Consume + extract
        id: extract
        env:
          KAFKA_BROKER: kafka.zonestream.openintel.nl:9092
          RUN_SECONDS: ${{ github.event.inputs.run_seconds || '18000' }}
          MAX_MSGS: ${{ github.event.inputs.max_msgs || '0' }}
          SHARD_COUNT: ${{ matrix.shard_count }}
          GROUP_SUFFIX: ${{ github.event.inputs.group_suffix || '' }}
        run: |
          OUTDIR="observations/${{ steps.window.outputs.day }}-${{ steps.window.outputs.hour }}"
          mkdir -p "$OUTDIR"
          # Dispatch to the format-appropriate consumer and pick the output
          # extension to match what the script writes. EXT must stay in sync
          # with retry.yml's missing-shard detection (matching jq case).
          #   avro_dns  → consume_group.py writes Parquet (zstd-3, dict-encoded);
          #               dedup'd DNS observations, query with duckdb.
          #   json      → consume_json.py writes gzipped JSONL verbatim.
          case "${{ matrix.format }}" in
            avro_dns)
              SCRIPT=scripts/consume_group.py
              EXT=parquet ;;
            json)
              SCRIPT=scripts/consume_json.py
              EXT=jsonl.gz ;;
            *)
              echo "Unknown matrix.format='${{ matrix.format }}'"; exit 1 ;;
          esac
          OBS="$OUTDIR/${{ matrix.topic }}.shard-${{ matrix.shard }}.$EXT"
          GROUP="gha-${{ github.event.repository.name }}-${{ matrix.topic }}-shard${{ matrix.shard }}${GROUP_SUFFIX}"
          python "$SCRIPT" \
            --topic ${{ matrix.topic }} \
            --group "$GROUP" \
            --start-ms ${{ steps.window.outputs.start_ms }} \
            --end-ms ${{ steps.window.outputs.end_ms }} \
            --shard-index ${{ matrix.shard }} \
            --shard-count "$SHARD_COUNT" \
            --run-seconds "$RUN_SECONDS" \
            --max-msgs "$MAX_MSGS" \
            --out-obs "$OBS"
          ls -lh "$OBS"
          echo "obs_size_bytes=$(stat -c %s "$OBS")" >> $GITHUB_OUTPUT
          echo "obs_path=$OBS" >> $GITHUB_OUTPUT

      - name: Upload as Release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.window.outputs.tag }}"
          DAY="${{ steps.window.outputs.day }}"
          HOUR="${{ steps.window.outputs.hour }}"
          gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" -R "$GITHUB_REPOSITORY" \
              --title "DNS tracking ${DAY} ${HOUR}:00 UTC" \
              --notes "Per-topic per-shard observation streams extracted from OpenINTEL Zonestream topics — 12h window ending ${DAY}T${HOUR}:00:00Z."
          gh release upload "$TAG" -R "$GITHUB_REPOSITORY" --clobber \
            "${{ steps.extract.outputs.obs_path }}"

      - name: Job summary
        run: |
          echo "### ${{ matrix.topic }} shard ${{ matrix.shard }} on ${{ steps.window.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- obs: $(numfmt --to=iec ${{ steps.extract.outputs.obs_size_bytes }})" >> $GITHUB_STEP_SUMMARY
