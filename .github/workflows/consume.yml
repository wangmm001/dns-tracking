name: consume

# Consume the three OpenINTEL Zonestream *_measurements Avro topics,
# extract domainâ†’IP / domainâ†’NS observations, and publish per-day per-topic
# gzipped JSONL files as Release assets.
#
# Uses stable Kafka consumer groups so progress survives across runs.
# Each run consumes up to ZS_RUN_SECONDS of wall-clock time per topic
# (running all three topics in parallel via the matrix strategy).
#
# Schedule: daily at 00:30 UTC. Manual dispatch supported with overrides.

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      run_seconds:
        description: 'Wall-clock budget per topic (seconds)'
        required: false
        default: '18000'   # 5h ; GH Actions hard limit is 6h
      max_msgs:
        description: 'Per-topic message cap (0 = unlimited)'
        required: false
        default: '0'
      offset_reset:
        description: 'On first connect for new consumer group: earliest | latest'
        required: false
        default: 'latest'
      group_suffix:
        description: 'Optional consumer-group suffix; change to fork offsets'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  consume:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        topic:
          - newly_registered_domains_measurements
          - newly_registered_fqdn_measurements
          - newly_issued_certificates_measurements
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          pip install --quiet fastavro confluent-kafka

      - name: Install kcat
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y kafkacat
          which kcat || sudo ln -s "$(which kafkacat)" /usr/local/bin/kcat
          kcat -V | head -1

      - name: Set window
        id: window
        run: |
          DAY=$(date -u +%F)
          echo "day=$DAY" >> $GITHUB_OUTPUT
          echo "Topic: ${{ matrix.topic }}"
          echo "Day:   $DAY"

      - name: Consume + extract
        id: extract
        env:
          KAFKA_BROKER: kafka.zonestream.openintel.nl:9092
          RUN_SECONDS: ${{ github.event.inputs.run_seconds || '18000' }}
          MAX_MSGS: ${{ github.event.inputs.max_msgs || '0' }}
          OFFSET_RESET: ${{ github.event.inputs.offset_reset || 'latest' }}
          GROUP_SUFFIX: ${{ github.event.inputs.group_suffix || '' }}
        run: |
          mkdir -p observations/${{ steps.window.outputs.day }} samples/${{ steps.window.outputs.day }}
          OBS="observations/${{ steps.window.outputs.day }}/${{ matrix.topic }}.jsonl.gz"
          SAMPLE="samples/${{ steps.window.outputs.day }}/${{ matrix.topic }}.sample.jsonl.gz"
          # Use a consumer-group consume so progress persists between runs
          python scripts/consume_group.py \
            --topic ${{ matrix.topic }} \
            --group "gha-dns-tracking-${GITHUB_REPOSITORY##*/}-${{ matrix.topic }}${GROUP_SUFFIX}" \
            --run-seconds "$RUN_SECONDS" \
            --max-msgs "$MAX_MSGS" \
            --offset-reset "$OFFSET_RESET" \
            --sample-n 200 \
            --out-obs "$OBS" \
            --out-sample "$SAMPLE"
          ls -lh "$OBS" "$SAMPLE"
          # Capture stats for the release body
          echo "obs_size_bytes=$(stat -c %s "$OBS")" >> $GITHUB_OUTPUT
          echo "sample_size_bytes=$(stat -c %s "$SAMPLE")" >> $GITHUB_OUTPUT
          echo "obs_path=$OBS" >> $GITHUB_OUTPUT
          echo "sample_path=$SAMPLE" >> $GITHUB_OUTPUT

      - name: Upload as Release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DAY=${{ steps.window.outputs.day }}
          TAG="snap-${DAY}"
          # Create release if missing (idempotent)
          gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" -R "$GITHUB_REPOSITORY" \
              --title "DNS tracking ${DAY}" \
              --notes "Per-topic observation streams extracted from OpenINTEL Zonestream measurement topics on ${DAY}."
          # Upload (clobber to allow multi-run-per-day appends)
          gh release upload "$TAG" -R "$GITHUB_REPOSITORY" --clobber \
            "${{ steps.extract.outputs.obs_path }}" \
            "${{ steps.extract.outputs.sample_path }}"

      - name: Job summary
        run: |
          echo "### ${{ matrix.topic }} on ${{ steps.window.outputs.day }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- obs: $(numfmt --to=iec ${{ steps.extract.outputs.obs_size_bytes }})" >> $GITHUB_STEP_SUMMARY
          echo "- sample: $(numfmt --to=iec ${{ steps.extract.outputs.sample_size_bytes }})" >> $GITHUB_STEP_SUMMARY
