name: consume

# Consume OpenINTEL Zonestream topics in parallel shards (each shard =
# independent broker fetch quota → linear speed-up). Publishes per-day
# Release assets — extracted DNS observations (Avro topics) or raw JSONL
# (JSON topics).
#
# Matrix: per-topic config in .github/shards.json (shared with retry.yml).
# Each entry has `shards` (count) and `format` (`avro_dns` → script
# consume_group.py with DNS extraction, `json` → consume_json.py raw dump).
# Sized so each topic's slowest shard finishes within a similar wall-clock
# budget and total parallel job count stays ≤ 20 (GH Free public-repo
# concurrent-job ceiling).
#
# The `plan` job emits the matrix; when invoked with a non-empty `targets`
# input (e.g. by retry.yml) it runs only that subset, enabling per-shard
# re-runs without re-doing finished work.
#
# Schedule: daily at 00:30 UTC. Manual dispatch supported with overrides.

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      run_seconds:
        description: 'Wall-clock budget per shard (seconds; GH max 21600)'
        required: false
        default: '18000'
      window_hours:
        description: 'How many hours back from now to consume'
        required: false
        default: '24'
      max_msgs:
        description: 'Per-shard message cap (0 = unlimited)'
        required: false
        default: '0'
      group_suffix:
        description: 'Optional group suffix to fork from prior runs'
        required: false
        default: ''
      targets:
        description: 'Optional JSON array overriding the matrix; e.g. ''[{"topic":"newly_registered_domains_measurements","shard":3,"shard_count":11,"format":"avro_dns"}]''. Each entry needs topic/shard/shard_count/format. Empty = full matrix from .github/shards.json.'
        required: false
        default: ''
      day:
        description: 'Override the UTC date the run targets (YYYY-MM-DD). Empty = today UTC at job start. Use when re-driving an earlier day.'
        required: false
        default: ''

permissions:
  contents: write

# Prevent concurrent runs (scheduled cron + manual dispatch racing on the
# same Release / consumer groups). New run waits if one is in progress.
concurrency:
  group: consume
  cancel-in-progress: false

jobs:
  plan:
    # Emit the matrix for the consume job. Default: full plan from
    # .github/shards.json. When `targets` input is set, use it as-is so
    # callers (e.g. retry.yml) can run any subset of (topic, shard, shard_count).
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: set
        env:
          TARGETS: ${{ github.event.inputs.targets }}
        run: |
          set -euo pipefail
          if [ -n "$TARGETS" ]; then
            INCLUDE="$TARGETS"
          else
            INCLUDE=$(jq -c '[to_entries[] as $e | range(0; $e.value.shards) | {topic: $e.key, shard: ., shard_count: $e.value.shards, format: $e.value.format}]' .github/shards.json)
          fi
          MATRIX=$(jq -nc --argjson inc "$INCLUDE" '{include: $inc}')
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Plan ($(echo "$INCLUDE" | jq 'length') jobs):"
          echo "$INCLUDE" | jq

  consume:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          pip install --quiet fastavro confluent-kafka

      - name: Set window
        id: window
        env:
          WINDOW_HOURS: ${{ github.event.inputs.window_hours || '24' }}
          DAY_INPUT: ${{ github.event.inputs.day }}
        run: |
          # Anchor the window to UTC midnight of the target day so consecutive
          # runs tile [D 00:00, D+1 00:00) with no overlap or gap, regardless
          # of cron-fire jitter. snap-DAY contains the 24h ending at DAY 00:00 UTC.
          # `day` input overrides today's UTC date — used by retry.yml so a
          # queued retry that crosses midnight still targets the intended day.
          DAY="${DAY_INPUT:-$(date -u +%F)}"
          END_MS=$(($(date -u -d "${DAY}T00:00:00Z" +%s) * 1000))
          START_MS=$((END_MS - WINDOW_HOURS * 3600 * 1000))
          echo "day=$DAY" >> $GITHUB_OUTPUT
          echo "end_ms=$END_MS" >> $GITHUB_OUTPUT
          echo "start_ms=$START_MS" >> $GITHUB_OUTPUT
          echo "Topic: ${{ matrix.topic }}  Shard: ${{ matrix.shard }}  Day: $DAY"
          echo "Window: $START_MS → $END_MS  (${WINDOW_HOURS}h, anchored to ${DAY}T00:00:00Z)"

      - name: Consume + extract
        id: extract
        env:
          KAFKA_BROKER: kafka.zonestream.openintel.nl:9092
          RUN_SECONDS: ${{ github.event.inputs.run_seconds || '18000' }}
          MAX_MSGS: ${{ github.event.inputs.max_msgs || '0' }}
          SHARD_COUNT: ${{ matrix.shard_count }}
          GROUP_SUFFIX: ${{ github.event.inputs.group_suffix || '' }}
        run: |
          mkdir -p observations/${{ steps.window.outputs.day }}
          OBS="observations/${{ steps.window.outputs.day }}/${{ matrix.topic }}.shard-${{ matrix.shard }}.jsonl.gz"
          GROUP="gha-${{ github.event.repository.name }}-${{ matrix.topic }}-shard${{ matrix.shard }}${GROUP_SUFFIX}"
          # Dispatch to the format-appropriate consumer:
          #   avro_dns  → consume_group.py extracts dedup'd DNS observations
          #   json      → consume_json.py dumps raw JSONL verbatim
          case "${{ matrix.format }}" in
            avro_dns)
              SCRIPT=scripts/consume_group.py ;;
            json)
              SCRIPT=scripts/consume_json.py ;;
            *)
              echo "Unknown matrix.format='${{ matrix.format }}'"; exit 1 ;;
          esac
          python "$SCRIPT" \
            --topic ${{ matrix.topic }} \
            --group "$GROUP" \
            --start-ms ${{ steps.window.outputs.start_ms }} \
            --end-ms ${{ steps.window.outputs.end_ms }} \
            --shard-index ${{ matrix.shard }} \
            --shard-count "$SHARD_COUNT" \
            --run-seconds "$RUN_SECONDS" \
            --max-msgs "$MAX_MSGS" \
            --out-obs "$OBS"
          ls -lh "$OBS"
          echo "obs_size_bytes=$(stat -c %s "$OBS")" >> $GITHUB_OUTPUT
          echo "obs_path=$OBS" >> $GITHUB_OUTPUT

      - name: Upload as Release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DAY=${{ steps.window.outputs.day }}
          TAG="snap-${DAY}"
          gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" -R "$GITHUB_REPOSITORY" \
              --title "DNS tracking ${DAY}" \
              --notes "Per-topic per-shard observation streams extracted from OpenINTEL Zonestream measurement topics on ${DAY}."
          gh release upload "$TAG" -R "$GITHUB_REPOSITORY" --clobber \
            "${{ steps.extract.outputs.obs_path }}"

      - name: Job summary
        run: |
          echo "### ${{ matrix.topic }} shard ${{ matrix.shard }} on ${{ steps.window.outputs.day }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- obs: $(numfmt --to=iec ${{ steps.extract.outputs.obs_size_bytes }})" >> $GITHUB_STEP_SUMMARY
