name: consume

# Consume the three OpenINTEL Zonestream *_measurements Avro topics in
# parallel shards (each shard = independent broker fetch quota → linear
# speed-up). Extracts domain→IP / domain→NS observations to gzipped JSONL
# and publishes per-day Release assets.
#
# Matrix: per-topic shard counts sized to historical worst-case duration
# so all topics finish in a similar wall-clock budget. Total parallel
# job count stays ≤ 20 (GH Free public-repo concurrent-job ceiling).
#
#   newly_issued_certificates_measurements   3 shards  (fast topic)
#   newly_registered_fqdn_measurements       4 shards  (medium)
#   newly_registered_domains_measurements   13 shards  (slow, dominant)
#
# Schedule: daily at 00:30 UTC. Manual dispatch supported with overrides.

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      run_seconds:
        description: 'Wall-clock budget per shard (seconds; GH max 21600)'
        required: false
        default: '18000'
      window_hours:
        description: 'How many hours back from now to consume'
        required: false
        default: '24'
      max_msgs:
        description: 'Per-shard message cap (0 = unlimited)'
        required: false
        default: '0'
      group_suffix:
        description: 'Optional group suffix to fork from prior runs'
        required: false
        default: ''

permissions:
  contents: write

# Prevent concurrent runs (scheduled cron + manual dispatch racing on the
# same Release / consumer groups). New run waits if one is in progress.
concurrency:
  group: consume
  cancel-in-progress: false

jobs:
  consume:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          # Fast: certs avg ~43min/shard at 6-way; trim to 3 shards (~85min each).
          - { topic: newly_issued_certificates_measurements, shard: 0, shard_count: 3 }
          - { topic: newly_issued_certificates_measurements, shard: 1, shard_count: 3 }
          - { topic: newly_issued_certificates_measurements, shard: 2, shard_count: 3 }
          # Medium: fqdn avg ~55min/shard at 6-way; trim to 4 shards (~85min each).
          - { topic: newly_registered_fqdn_measurements, shard: 0, shard_count: 4 }
          - { topic: newly_registered_fqdn_measurements, shard: 1, shard_count: 4 }
          - { topic: newly_registered_fqdn_measurements, shard: 2, shard_count: 4 }
          - { topic: newly_registered_fqdn_measurements, shard: 3, shard_count: 4 }
          # Slow: domains worst-case 240min/shard at 6-way; grow to 13 shards
          # (~110min each, also halves single-asset size below 2GiB Release limit).
          - { topic: newly_registered_domains_measurements, shard: 0,  shard_count: 13 }
          - { topic: newly_registered_domains_measurements, shard: 1,  shard_count: 13 }
          - { topic: newly_registered_domains_measurements, shard: 2,  shard_count: 13 }
          - { topic: newly_registered_domains_measurements, shard: 3,  shard_count: 13 }
          - { topic: newly_registered_domains_measurements, shard: 4,  shard_count: 13 }
          - { topic: newly_registered_domains_measurements, shard: 5,  shard_count: 13 }
          - { topic: newly_registered_domains_measurements, shard: 6,  shard_count: 13 }
          - { topic: newly_registered_domains_measurements, shard: 7,  shard_count: 13 }
          - { topic: newly_registered_domains_measurements, shard: 8,  shard_count: 13 }
          - { topic: newly_registered_domains_measurements, shard: 9,  shard_count: 13 }
          - { topic: newly_registered_domains_measurements, shard: 10, shard_count: 13 }
          - { topic: newly_registered_domains_measurements, shard: 11, shard_count: 13 }
          - { topic: newly_registered_domains_measurements, shard: 12, shard_count: 13 }
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          pip install --quiet fastavro confluent-kafka

      - name: Set window
        id: window
        env:
          WINDOW_HOURS: ${{ github.event.inputs.window_hours || '24' }}
        run: |
          # Anchor the window to UTC midnight of the run date so consecutive
          # runs tile [D 00:00, D+1 00:00) with no overlap or gap, regardless
          # of cron-fire jitter. snap-DAY contains the 24h ending at DAY 00:00 UTC.
          DAY=$(date -u +%F)
          END_MS=$(($(date -u -d "${DAY}T00:00:00Z" +%s) * 1000))
          START_MS=$((END_MS - WINDOW_HOURS * 3600 * 1000))
          echo "day=$DAY" >> $GITHUB_OUTPUT
          echo "end_ms=$END_MS" >> $GITHUB_OUTPUT
          echo "start_ms=$START_MS" >> $GITHUB_OUTPUT
          echo "Topic: ${{ matrix.topic }}  Shard: ${{ matrix.shard }}  Day: $DAY"
          echo "Window: $START_MS → $END_MS  (${WINDOW_HOURS}h, anchored to ${DAY}T00:00:00Z)"

      - name: Consume + extract
        id: extract
        env:
          KAFKA_BROKER: kafka.zonestream.openintel.nl:9092
          RUN_SECONDS: ${{ github.event.inputs.run_seconds || '18000' }}
          MAX_MSGS: ${{ github.event.inputs.max_msgs || '0' }}
          SHARD_COUNT: ${{ matrix.shard_count }}
          GROUP_SUFFIX: ${{ github.event.inputs.group_suffix || '' }}
        run: |
          mkdir -p observations/${{ steps.window.outputs.day }}
          OBS="observations/${{ steps.window.outputs.day }}/${{ matrix.topic }}.shard-${{ matrix.shard }}.jsonl.gz"
          GROUP="gha-${{ github.event.repository.name }}-${{ matrix.topic }}-shard${{ matrix.shard }}${GROUP_SUFFIX}"
          python scripts/consume_group.py \
            --topic ${{ matrix.topic }} \
            --group "$GROUP" \
            --start-ms ${{ steps.window.outputs.start_ms }} \
            --end-ms ${{ steps.window.outputs.end_ms }} \
            --shard-index ${{ matrix.shard }} \
            --shard-count "$SHARD_COUNT" \
            --run-seconds "$RUN_SECONDS" \
            --max-msgs "$MAX_MSGS" \
            --out-obs "$OBS"
          ls -lh "$OBS"
          echo "obs_size_bytes=$(stat -c %s "$OBS")" >> $GITHUB_OUTPUT
          echo "obs_path=$OBS" >> $GITHUB_OUTPUT

      - name: Upload as Release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DAY=${{ steps.window.outputs.day }}
          TAG="snap-${DAY}"
          gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" -R "$GITHUB_REPOSITORY" \
              --title "DNS tracking ${DAY}" \
              --notes "Per-topic per-shard observation streams extracted from OpenINTEL Zonestream measurement topics on ${DAY}."
          gh release upload "$TAG" -R "$GITHUB_REPOSITORY" --clobber \
            "${{ steps.extract.outputs.obs_path }}"

      - name: Job summary
        run: |
          echo "### ${{ matrix.topic }} shard ${{ matrix.shard }} on ${{ steps.window.outputs.day }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- obs: $(numfmt --to=iec ${{ steps.extract.outputs.obs_size_bytes }})" >> $GITHUB_STEP_SUMMARY
