name: retry-missing-shards

# Scan the most recent consume window's snap-YYYY-MM-DD-HH Release for shards
# listed in .github/shards.json that didn't land (consume.yml job failed or
# got dropped), then re-dispatch consume.yml targeting only the missing
# (topic, shard, shard_count, format) entries.
#
# Runs twice daily, 4h after each main consume fire (00:30 + 4h = 04:30,
# 12:30 + 4h = 16:30 UTC). Re-dispatch enters consume.yml's
# `concurrency: consume` queue, so if the main run is somehow still going,
# retry waits.

on:
  schedule:
    - cron: '30 4,16 * * *'
  workflow_dispatch:
    inputs:
      day:
        description: 'UTC date to check (YYYY-MM-DD); empty = today UTC at retry-time'
        required: false
        default: ''
      hour:
        description: 'Window-end hour to check (00 or 12, UTC); empty = nearest preceding 12h boundary from current UTC time'
        required: false
        default: ''
      dry_run:
        description: 'If "true", only print missing shards; do not dispatch consume.yml'
        required: false
        default: 'false'

permissions:
  contents: read
  actions: write

concurrency:
  group: retry-missing-shards
  cancel-in-progress: false

jobs:
  scan-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Compute missing shards and dispatch
        env:
          GH_TOKEN: ${{ github.token }}
          DAY_INPUT: ${{ github.event.inputs.day }}
          HOUR_INPUT: ${{ github.event.inputs.hour }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail

          DAY="${DAY_INPUT:-$(date -u +%F)}"
          if [ -n "$HOUR_INPUT" ]; then
            HOUR="$HOUR_INPUT"
          else
            NOW_H=$(date -u +%H)
            if [ "$((10#$NOW_H))" -lt 12 ]; then HOUR=00; else HOUR=12; fi
          fi
          if [ "$HOUR" != "00" ] && [ "$HOUR" != "12" ]; then
            echo "hour must be 00 or 12, got $HOUR"; exit 1
          fi
          TAG="snap-${DAY}-${HOUR}"
          echo "Checking $TAG in $GITHUB_REPOSITORY"

          if gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            EXISTING=$(gh release view "$TAG" -R "$GITHUB_REPOSITORY" --json assets --jq '[.assets[].name]')
          else
            echo "Release $TAG does not exist — every shard counts as missing."
            EXISTING='[]'
          fi
          echo "Existing assets: $EXISTING"

          # File extension follows matrix.format — kept in sync with the
          # case-statement in consume.yml. avro_dns writes Parquet now;
          # JSON topics still gzipped JSONL.
          MISSING=$(jq -nc \
            --slurpfile exp .github/shards.json \
            --argjson have "$EXISTING" '
            def ext(fmt): if fmt == "avro_dns" then ".parquet" else ".jsonl.gz" end;
            [
              $exp[0] | to_entries[] as $e |
              range(0; $e.value.shards) as $i |
              ($e.key + ".shard-" + ($i|tostring) + ext($e.value.format)) as $name |
              if any($have[]; . == $name) then empty
              else {topic: $e.key, shard: $i, shard_count: $e.value.shards, format: $e.value.format} end
            ]')

          COUNT=$(echo "$MISSING" | jq 'length')
          echo "Missing: $COUNT shard(s)"
          echo "$MISSING" | jq

          {
            echo "## Retry scan for ${TAG}"
            echo ""
            echo "- Missing shards: **${COUNT}**"
            if [ "$COUNT" -gt 0 ]; then
              echo ""
              echo '```json'
              echo "$MISSING" | jq
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$COUNT" -eq 0 ]; then
            echo "All shards present — nothing to retry."
            exit 0
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo "dry_run=true — not dispatching."
            exit 0
          fi

          gh workflow run consume.yml \
            -R "$GITHUB_REPOSITORY" \
            -f targets="$MISSING" \
            -f day="$DAY" \
            -f hour="$HOUR"
          echo "Dispatched consume.yml with targets ($COUNT shards) for ${TAG}"
